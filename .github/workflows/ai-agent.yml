name: Task Pipeline AI Agent (Gemini Core)

on:
  discussion:
    types: [created]

permissions:
  contents: write
  discussions: read

jobs:
  gemini-brain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Call Gemini via GitHub Models
        id: gemini
        uses: github/cognitive-services-action@v1 # ← 正しい公式部品の名前に修正しました
        with:
          model: "gemini-1.5-pro" # 安定して動く小文字表記に統一
          prompt: |
            あなたは「人類AI皆師匠」の精神を持つ、優秀なセカンドブレイン（AIエージェント）です。
            ユーザーがDiscussionsに投稿した以下のメモを読み、既存の知識を動員して綺麗に肉付け・構造化し、ナレッジとして清書してください。

            ■ユーザーの一言メモタイトル:
            ${{ github.event.discussion.title }}

            ■一言メモ本文:
            ${{ github.event.discussion.body }}

            ■出力フォーマット:
            `_doc/templates/wiki-template.md` の型（フロントマター構造）を真似て、Markdown形式で出力してください。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log Gemini Response
        run: |
          echo "==== Gemini Brain Output ===="
          echo "${{ steps.gemini.outputs.response }}" # 取得する出力名も最適化
          echo "============================="