name: Task Pipeline AI Agent Test

on:
  discussion:
    types: [created] # 新しいDiscussionが作られたら起動

jobs:
  log-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Discussion Event
        run: |
          echo "==== AI Agent Pipeline Triggered ===="
          echo "Discussion Title: ${{ github.event.discussion.title }}"
          echo "Discussion Category: ${{ github.event.discussion.category.name }}"
          echo "Action performed by: ${{ github.event.issue.user.login }}"
          echo "====================================="
