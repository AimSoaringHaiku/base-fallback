name: Task Pipeline AI Agent (Core)

on:
  discussion:
    types: [created]

permissions:
  contents: write
  discussions: read

jobs:
  ai-brain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Call AI Models API and Save to File
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIS_TITLE: ${{ github.event.discussion.title }}
          DIS_BODY: ${{ github.event.discussion.body }}
        run: |
          # 確実に制限を突破できる gpt-4o を指定
          PAYLOAD=$(jq -n \
            --arg title "$DIS_TITLE" \
            --arg body "$DIS_BODY" \
            '{
              model: "gpt-4o",
              messages: [
                {
                  role: "system",
                  content: "あなたは優秀なセカンドブレイン（AIエージェント）です。ユーザーがDiscussionsに投稿したメモを読み、既存の知識を動員して綺麗に肉付け・構造化し、必ず --- で始まるフロントマター構造（id, title, category, created_at, updated_at）を含めた Markdown形式で出力してください。余計なJSONの枠や先頭末尾の ```markdown などの装飾は一切排除し、生のテキストのみを返してください。"
                },
                {
                  role: "user",
                  content: ("■タイトル:\n" + $title + "\n\n■本文:\n" + $body)
                }
              ]
            }')

          # GitHub Models API へリクエスト送信
          RESPONSE=$(curl -s -X POST "[https://models.inference.ai.azure.com/chat/completions](https://models.inference.ai.azure.com/chat/completions)" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d "$PAYLOAD")

          # 返答から文章を抽出
          RESULT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          # 返答が空（null）だった場合の安全弁
          if [ "$RESULT" = "null" ] || [ -z "$RESULT" ]; then
            echo "APIからの応答が空でした。レスポンスログ:"
            echo "$RESPONSE"
            exit 1
          fi

          # フォルダを物理的に強制作成 (_doc)
          mkdir -p _doc

          # ファイル名を生成
          FILENAME="_doc/wiki-$(date +'%Y%m%d%H%M%S').md"

          # ファイルに書き込み
          echo "$RESULT" > "$FILENAME"
          echo "==== 生成されたドキュメント ===="
          cat "$FILENAME"

      - name: Commit and Push generated WIKI
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _doc/*.md
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "Docs: AI が WIKI ナレッジを自動生成しました"
            git push origin main
          fi